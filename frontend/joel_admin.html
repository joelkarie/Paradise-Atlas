<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/x-icon" href="/static/assets/peach_dot.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <meta charset="UTF-8">
  <title>Joel Admin Locations</title>

  <style>
    body {
      font-family: 'Playfair Display', serif;
      margin: 20px;
      background-color: #FCC3A4;
    }


    label {
      margin-right: 12px;
    }
  </style>
</head>

<body>
  <div>
    <img src="/static/assets/paradise_pelican.png" alt="Atlas Paradiso Logo" class="logo" height="170px">
  </div>
  <h1>Joel Locations Admin</h1>

  <div id="locations"></div>

  <script>
    fetch("/admin/locations")
      .then(r => r.json())
      .then(data => {
        document.getElementById("locations").innerHTML = data.map(loc => {

          const label = `${loc.location}, ${loc.state}, ${loc.country}`;

          return `
        <div class="location-card">

          <div class="location-title">${label}</div>

          <div class="rating-row">
              <div class="subtitle">Could you live here?</div>

              <label>
                  <input type="radio"
                      name="loc_${loc.location}"
                      value="true"
                      ${loc.joel_could_live === true ? "checked" : ""}
                      onchange="updateLocation('${loc.location_id}', true)">
                  True
              </label>

              <label>
                  <input type="radio"
                      name="loc_${loc.location}"
                      value="false"
                      ${loc.joel_could_live === false ? "checked" : ""}
                      onchange="updateLocation('${loc.location_id}', false)">
                  False
              </label>

            <div class="meta">
              Joel: ${loc.joel_could_live ? "Yes" : "No"} </br>
              Michael: ${loc.micahel_could_live ? "Yes" : "No"}
            </div>

          </div>

        </div>
      `;
        }).join("");
      });

    function updateLocation(location_id, value) {
      const formData = new FormData();
      formData.append("location_id", location_id);
      formData.append("field", "joel_could_live");
      formData.append("could_live", value);

      fetch("/locations/update_could_live", {
        method: "POST",
        body: formData
      })
        .then(r => r.json())
        .then(res => {
          console.log("updated:", res);
        });
    }
  </script>

</body>

</html>
